name: goreleaser

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      gpg_fingerprint: ${{ steps.import_gpg.outputs.fingerprint }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      # We still upload this so Job 2 can grab it, but it only needs to live for 1 day now!
      - name: Upload deb packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 1 

  deploy-apt-repo:
    needs: goreleaser
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Create a clean directory for the web files instead of checking out a branch
      - name: Create Repo Directory
        run: mkdir -p apt-repo

      - name: Download deb packages
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: deb-packages

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils dpkg-dev

      - name: Build APT repository structure
        run: |
          # We use our clean folder instead of 'gh-pages'
          REPO_DIR="apt-repo"
          SUITE="trixie"

          mkdir -p "$REPO_DIR/pool/$SUITE/main"
          mkdir -p "$REPO_DIR/dists/$SUITE/main/binary-amd64"
          mkdir -p "$REPO_DIR/dists/$SUITE/main/binary-arm64"

          cp deb-packages/*.deb "$REPO_DIR/pool/$SUITE/main/"

          cd "$REPO_DIR"

          for arch in amd64 arm64; do
            dpkg-scanpackages --arch "$arch" "pool/$SUITE/main" \
              > "dists/$SUITE/main/binary-$arch/Packages"
            gzip -k -f "dists/$SUITE/main/binary-$arch/Packages"
          done

          cd "dists/$SUITE"
          apt-ftparchive release . > Release

          cd ../..
          
          # Sign the release
          echo "${{ secrets.GPG_PASSPHRASE }}" | \
            gpg --batch --yes --passphrase-fd 0 \
              --default-key "${{ needs.goreleaser.outputs.gpg_fingerprint }}" \
              --output "dists/$SUITE/InRelease" \
              --clearsign "dists/$SUITE/Release"

          # Export the public key so users can download it
          gpg --export --armor \
            "${{ needs.goreleaser.outputs.gpg_fingerprint }}" \
            > "gorush-archive-keyring.gpg"

      # Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Bundle the 'apt-repo' folder we just built
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './apt-repo'

      # Send it straight to the live web servers
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
